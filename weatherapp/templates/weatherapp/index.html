{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="{% static 'style.css' %}" />
</head>

<body
{% if exception_occurred %}
  style="background-image: url('https://images.pexels.com/photos/3008509/pexels-photo-3008509.jpeg?auto=compress&cs=tinysrgb&w=1600');"
{% elif image_url %}
  style="background-image: url('{{ image_url }}');"
{% else %}
  style="background-image: url('https://images.pexels.com/photos/531756/pexels-photo-531756.jpeg?auto=compress&cs=tinysrgb&w=1600');"
{% endif %}
>

  <div class="container">
    <h1 class="heading">Weather App</h1>

    <!-- Search Form -->
    <form method="POST">
      {% csrf_token %}
      <input
        type="text"
        name="city"
        placeholder="Enter City"
        value="{{ city }}"
        required
      />
      <button type="submit" class="btn">Search</button>
    </form>

    <!-- Weather Info -->
    {% if temp %}
    <div class="weather">
      <div class="left">
        <h2 class="temp">{{ temp }}&#176; C</h2>
        <h2 class="city">{{ city }}</h2>
      </div>

      <div class="right">
        <div class="icon">
          <img
            src="https://openweathermap.org/img/w/{{ icon }}.png"
            width="120"
            alt="Weather Icon"
          />
        </div>

        <div class="condition">
          <p>{{ description }}</p>
          <p>{{ day }}</p>
        </div>
      </div>
    </div>
    {% endif %}
  </div>

  <!-- Error Alert -->
  {% if exception_occurred %}
  <script>
    window.onload = function () {
      alert("City information is not available from Weather API");
    };
  </script>
  {% endif %}

</body>
</html>
